default_model: gemini-flash-latest

models:
  claude-3-5-sonnet:
    provider: anthropic
    model_name: claude-3-5-sonnet-20240620
    temperature: 0.7
    max_tokens: 4096
    top_p: 0.9
    stream: true

  gpt-4o:
    provider: openai
    model_name: gpt-4o
    temperature: 0.5
    max_tokens: 2048
    top_p: 1.0
    stream: false

  gemini-flash-latest:
    provider: google
    model_name: gemini-flash-latest
    temperature: 1.0
    max_tokens: 4096

  gemini-pro-latest:
    provider: google
    model_name: gemini-pro-latest
    temperature: 0.7
    max_tokens: 4096

  local-llama:
    provider: local
    model_name: llama-3-8b-instruct
    api_base: "http://localhost:11434/v1"
    temperature: 0.8
    max_tokens: 1024

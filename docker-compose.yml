version: '3.8'

services:
  # AI Core Infrastructure
  chromadb:
    image: chromadb/chroma:latest
    container_name: agent_chroma
    ports:
      - "8001:8000"
    volumes:
      - ./data/vectordb:/chroma/chroma
    environment:
      - ALLOW_RESET=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    restart: always

  redis:
    image: redis:alpine
    container_name: agent_redis
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis_data:/data
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: agent_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
      POSTGRES_DB: ${POSTGRES_DB:-agent_db}
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    restart: always

  # --- Application Stack ---
  
  inference:
    build:
      context: .
      dockerfile: Dockerfile # Dùng chung Dockerfile nếu nó cài đủ python & node, hoặc tạo cái mới.
    container_name: agent_inference
    command: python3 src/inference/server.py
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - INFERENCE_PORT=8000
      - REDIS_HOST=agent_redis
    depends_on:
      - redis
    restart: always

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: agent_api
    env_file: .env
    ports:
      - "3003:3000"
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./config:/app/config
      - ./.env:/app/.env
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://admin:admin_pass@agent_postgres:5432/agent_db?schema=public
      - REDIS_HOST=agent_redis
      - CHROMA_HOST=agent_chroma
      - CHROMA_PORT=8000
      - INFERENCE_URL=http://agent_inference:8000
    depends_on:
      - postgres
      - redis
      - chromadb
      - inference
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agent_frontend
    ports:
      - "3005:3000"
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3003/api/v1
    depends_on:
      - api
    restart: always
